<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Outer ring glow -->
  <rect width="192" height="192" rx="42" fill="none" stroke="#00ff88" stroke-width="3" opacity="0.3"/>
  <!-- BF monogram -->
  <text x="96" y="115" font-family="Arial Black, sans-serif" font-weight="900" font-size="80" text-anchor="middle" fill="url(#glow)" letter-spacing="-4">₱</text>
  <!-- Bottom accent line -->
  <rect x="48" y="148" width="96" height="4" rx="2" fill="url(#glow)" opacity="0.7"/>
  <!-- App name -->
  <text x="96" y="175" font-family="Arial, sans-serif" font-weight="700" font-size="13" text-anchor="middle" fill="#ffffff" opacity="0.6" letter-spacing="2">BUDGETFLOW</text>
</svg>
